<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>再生回数マイルストーン</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080d15;
  color: #c8d8e8;
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  min-height: 100vh;
}

/* ── Header ──────────────────────────────────────── */
.header {
  background: #0c1520;
  border-bottom: 1px solid #1a2a3a;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-title { font-size: 13px; font-weight: bold; letter-spacing: 1px; color: #4a9eff; white-space: nowrap; }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.last-updated { font-size: 10px; color: #2a5a7a; }

.btn {
  background: #0d1e30;
  border: 1px solid #2a4a6a;
  border-radius: 5px;
  color: #4a8aaa;
  font-family: inherit;
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn:hover { border-color: #4a9eff; color: #4a9eff; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.primary { border-color: #2a7acc; color: #4a9eff; }
.btn.active  { border-color: #cc8800; color: #ffaa00; }
.btn.danger { border-color: #4a1515; color: #cc4444; }
.btn.danger:hover { border-color: #cc4444; }

/* ── Stats bar ────────────────────────────────────── */
.stats-bar {
  display: flex;
  gap: 16px;
  padding: 7px 16px;
  background: #0a1018;
  border-bottom: 1px solid #0f1e2e;
  font-size: 11px;
}
.stat-item { display: flex; align-items: center; gap: 5px; }
.stat-badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: bold;
}
.stat-badge.approaching { background: #3a2800; color: #ffaa00; border: 1px solid #ffaa0060; }
.stat-badge.achieved    { background: #3a2a00; color: #ffd700; border: 1px solid #ffd70060; }
.stat-label { color: #3a6a8a; }
.stat-count { color: #c8d8e8; font-weight: bold; }

/* ── Card grid ────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
  padding: 12px;
}

.card {
  background: #0e1826;
  border: 1px solid #1a2a3a;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  transition: border-color .2s, box-shadow .2s;
  text-decoration: none;
  color: inherit;
  display: block;
  cursor: pointer;
}
/* 外部チャンネル: 紫系。ステータスクラスとの組み合わせも明示定義 */
.card.external {
  border-color: #9955ee;
  background: linear-gradient(160deg, #0e0820 0%, #120e28 60%);
  box-shadow: 0 0 14px #9955ee30;
}
.card.external.approaching {
  border: 2px solid #cc8800;
  background: linear-gradient(160deg, #180828 0%, #14122e 60%);
  box-shadow: 0 0 18px #ffaa0045;
}
.card.external.achieved {
  border: 2px solid #ffd700;
  background: linear-gradient(160deg, #1a0e18 0%, #1a1028 55%);
  box-shadow: 0 0 28px #ffd70070, inset 0 0 24px #ffd70012;
}
.card.external.achieved-1d {
  border-color: #cc9900;
  background: linear-gradient(160deg, #12082a 0%, #0e1028 60%);
  box-shadow: 0 0 16px #ffd70045;
}
.card.approaching {
  border: 2px solid #cc8800;
  box-shadow: 0 0 18px #ffaa0045;
}
.card.achieved {
  border: 2px solid #ffd700;
  background: linear-gradient(160deg, #1e1600 0%, #0e1826 55%);
  box-shadow: 0 0 28px #ffd70070, inset 0 0 24px #ffd70012;
}
.card.achieved-1d {
  border-color: #cc9900;
  box-shadow: 0 0 16px #ffd70045;
}


/* ── セクションヘッダー ──────────────────────────── */
.section-header {
  grid-column: 1 / -1;
  font-size: 10px;
  letter-spacing: 2px;
  color: #3a6a8a;
  padding: 8px 4px 4px;
  border-bottom: 1px solid #1a3050;
  margin-bottom: 2px;
}
.section-header:first-child { padding-top: 0; }

/* ── Toolbar (フィルタ・ソート) ────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  background: #090e18;
  border-bottom: 1px solid #0f1e2e;
  flex-wrap: wrap;
}
.toolbar-group { display: flex; gap: 4px; }
.toolbar-sep { color: #1a3a5a; margin: 0 2px; }
.tbtn {
  background: #0a1520;
  border: 1px solid #1a3a5a;
  border-radius: 4px;
  color: #3a6a8a;
  font-family: inherit;
  font-size: 10px;
  padding: 3px 9px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.tbtn:hover  { border-color: #3a7acc; color: #6aaeff; }
.tbtn.active { background: #0d2040; border-color: #3a7acc; color: #4a9eff; }

.thumb-wrap { position: relative; }
.card-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  display: block;
  background: #0a1520;
}
.thumb-duration {
  position: absolute;
  bottom: 4px;
  right: 4px;
  background: rgba(0,0,0,.85);
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  padding: 1px 5px;
  border-radius: 2px;
  font-variant-numeric: tabular-nums;
  letter-spacing: .3px;
}
.card-body { padding: 8px 10px 10px; }

.card-title {
  font-size: 11px;
  line-height: 1.45;
  color: #a8c8e0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
  min-height: 32px;
}

.views-row { display: flex; align-items: baseline; gap: 5px; margin-bottom: 7px; }
.views-count { font-size: 22px; font-weight: bold; color: #e8f0ff; font-variant-numeric: tabular-nums; }
.views-unit  { font-size: 11px; color: #3a6a8a; }
.growth-inline { font-size: 10px; color: #4a7a9a; margin-left: auto; white-space: nowrap; }

/* ── Achievement badge ─────────────────────────────── */
.achieved-badge {
  background: linear-gradient(135deg, #2a1a00, #3a2a00);
  border: 1px solid #aa880060;
  border-radius: 6px;
  padding: 5px 9px;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.achieved-icon { font-size: 14px; }
.achieved-text { font-size: 11px; color: #ffd700; font-weight: bold; }

/* ── Milestone row ─────────────────────────────────── */
.milestone-row {
  background: #080f18;
  border-radius: 6px;
  padding: 6px 9px;
  margin-bottom: 5px;
}
.milestone-label { font-size: 9px; color: #2a5a7a; letter-spacing: 1px; margin-bottom: 3px; }
.milestone-next  { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.milestone-target    { font-size: 14px; font-weight: bold; color: #6ab0ff; }
.milestone-remaining { font-size: 10px; color: #4a7a9a; }
.milestone-eta { font-size: 11px; font-weight: bold; white-space: nowrap; }
.milestone-eta.soon    { color: #ffaa00; }
.milestone-eta.normal  { color: #3a7a9a; }
.milestone-eta.unknown { color: #2a4a6a; }

.progress-wrap { height: 3px; background: #0a1520; border-radius: 2px; margin-top: 5px; overflow: hidden; }
.progress-bar  { height: 100%; border-radius: 2px; transition: width .4s; }
.progress-bar.approaching { background: linear-gradient(90deg, #886600, #ffaa00); }
.progress-bar.normal      { background: linear-gradient(90deg, #1a4a8a, #4a9eff); }

.card-bottom { display: flex; align-items: center; justify-content: space-between; gap: 4px; margin-top: 5px; }
.publish-row { font-size: 9px; color: #2a4a6a; }

/* ── Status messages ───────────────────────────────── */
.status-msg { text-align: center; padding: 60px 20px; font-size: 13px; color: #3a6a8a; }
.error-msg {
  background: #1a0808;
  border: 1px solid #4a1515;
  border-radius: 8px;
  padding: 12px 16px;
  margin: 12px;
  font-size: 12px;
  color: #cc4444;
  line-height: 1.6;
}

/* ── Setup screen ──────────────────────────────────── */
.setup-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
  padding: 24px;
}
.setup-box {
  background: #0e1826;
  border: 1px solid #1a2a3a;
  border-radius: 12px;
  padding: 24px;
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.setup-title { font-size: 15px; font-weight: bold; color: #4a9eff; }
.setup-desc  { font-size: 11px; color: #4a7a9a; line-height: 1.7; }

.field-label { font-size: 11px; color: #4a7a9a; margin-bottom: 4px; }
.field-input {
  width: 100%;
  background: #060d18;
  border: 1px solid #1a3a5a;
  border-radius: 5px;
  color: #c8d8e8;
  font-size: 12px;
  padding: 8px 10px;
  font-family: 'Courier New', monospace;
}
.field-input:focus { outline: none; border-color: #4a9eff; }

/* ── Settings modal ────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #000a;
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #0e1826;
  border: 1px solid #1a3a5a;
  border-radius: 12px;
  padding: 20px;
  width: 100%;
  max-width: 460px;
  max-height: 90vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.modal-title  { font-size: 13px; font-weight: bold; color: #4a9eff; letter-spacing: 1px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Responsive ─────────────────────────────────────── */
@media (max-width: 640px) {
  body { overflow-x: hidden; }
  .header { padding: 7px 10px; gap: 6px; }
  .header-title { font-size: 11px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .last-updated { display: none; }
  .header-right { gap: 5px; }
  .grid { grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 6px; }
  .card-body { padding: 5px 6px 6px; }
  .card-title { font-size: 9px; min-height: 24px; margin-bottom: 4px; }
  .views-count { font-size: 14px; }
  .views-unit { font-size: 9px; }
  .growth-inline { font-size: 9px; }
  .achieved-badge { padding: 3px 5px; margin-bottom: 3px; }
  .achieved-icon { font-size: 11px; }
  .achieved-text { font-size: 9px; }
  .milestone-row { padding: 3px 5px; margin-bottom: 3px; }
  .milestone-label { font-size: 0; letter-spacing: 0; margin-bottom: 2px; }
  .milestone-label::before { content: 'NEXT'; font-size: 8px; letter-spacing: 1px; color: #2a5a7a; }
  .milestone-next { gap: 3px; }
  .milestone-target { font-size: 12px; }
  .milestone-remaining { display: none; }
  .milestone-eta { font-size: 9px; }
  .progress-wrap { margin-top: 3px; }
  .publish-row { font-size: 8px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tweet-btn { font-size: 9px; padding: 1px 5px; flex-shrink: 0; }
  .external-badge { font-size: 8px; }
  .mark-btn { width: 22px; height: 22px; font-size: 12px; }
}
@media (max-width: 380px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .views-count { font-size: 16px; }
  .card-title { font-size: 10px; }
}

/* ── マークボタン ─────────────────────────────────────── */
.mark-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(0,0,0,.75);
  border: 1px solid #333;
  border-radius: 4px;
  color: #555;
  font-size: 14px;
  width: 26px;
  height: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  z-index: 2;
  padding: 0;
}
.mark-btn:hover       { border-color: #ffd700; color: #ffd700; }
.mark-btn.marked      { color: #ffd700; border-color: #ffd70080; }
.card.marked-card     { border-color: #4a3a00; }

/* ── カード下部アクション行 ─────────────────────────────── */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
}
.tweet-btn {
  background: transparent;
  border: 1px solid #1a3a5a;
  border-radius: 4px;
  color: #4a7aaa;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 7px;
  text-decoration: none;
  white-space: nowrap;
  transition: all .15s;
}
.tweet-btn:hover { border-color: #4a9eff; color: #4a9eff; }

/* ── 外部チャンネルバッジ ─────────────────────────────── */
.external-badge-row { margin-bottom: 4px; }
.external-badge {
  display: inline-block;
  font-size: 9px;
  color: #5aabff;
  border: 1px solid #2a5a9a;
  border-radius: 3px;
  padding: 0 5px;
  line-height: 16px;
}

/* ── 設定モーダル URL追加・ピン留めリスト ────────────── */
.field-divider { border: none; border-top: 1px solid #1a3a5a; margin: 2px 0; }
.field-textarea {
  width: 100%;
  background: #060d18;
  border: 1px solid #1a3a5a;
  border-radius: 5px;
  color: #c8d8e8;
  font-size: 11px;
  padding: 8px 10px;
  font-family: 'Courier New', monospace;
  resize: vertical;
  min-height: 70px;
}
.field-textarea:focus { outline: none; border-color: #4a9eff; }
.pinned-list { display: flex; flex-direction: column; gap: 2px; max-height: 130px; overflow-y: auto; }
.pinned-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  border-bottom: 1px solid #0f1e2e;
}
.pinned-title { font-size: 10px; color: #4a7a9a; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title" id="headerTitle">🎵 再生回数マイルストーン</div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">未取得</span>
    <button class="btn primary" id="refreshBtn" onclick="doRefresh()">更新</button>
    <button class="btn" id="notifBtn" onclick="requestNotif()" title="ブラウザ通知">🔔</button>
    <button class="btn" onclick="openSettings()">⚙</button>
  </div>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-item">
    <span class="stat-badge approaching">もうすぐ</span>
    <span class="stat-count" id="statApproaching">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-badge achieved">達成(48h)</span>
    <span class="stat-count" id="statAchieved">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">全</span>
    <span class="stat-count" id="statTotal">0</span>
    <span class="stat-label">本</span>
  </div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <div class="toolbar-group">
    <button class="tbtn active" id="fAll"      onclick="setChannelFilter('all')">全て</button>
    <button class="tbtn"        id="fOwn"      onclick="setChannelFilter('own')">自CH</button>
    <button class="tbtn"        id="fExternal" onclick="setChannelFilter('external')">他CH</button>
  </div>
  <button class="tbtn" id="fMarked" onclick="toggleMarkFilter()">★</button>
  <span class="toolbar-sep">|</span>
  <div class="toolbar-group">
    <button class="tbtn active" id="sViews"  onclick="setSort('views')">再生数</button>
    <button class="tbtn"        id="sDate"  onclick="setSort('date')">投稿日</button>
    <button class="tbtn"        id="sSoon"  onclick="setSort('soon')">注目</button>
    <button class="tbtn"        id="sTrend" onclick="setSort('trend')">勢い</button>
  </div>
</div>

<div id="mainContent">
  <div class="status-msg">読み込み中...</div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="modal-title">⚙ 設定</div>
    <div>
      <div class="field-label">YouTube Data API Key</div>
      <input class="field-input" type="password" id="cfgApiKey" placeholder="AIza...">
    </div>
    <div>
      <div class="field-label">チャンネルハンドル（@不要）</div>
      <input class="field-input" type="text" id="cfgChannel" placeholder="OtonoseKanade">
    </div>
    <div>
      <div class="field-label">「もうすぐ」閾値（日）</div>
      <input class="field-input" type="number" id="cfgThreshold" value="3" min="1" max="30">
    </div>
    <div>
      <div class="field-label">自動更新間隔（分）</div>
      <input class="field-input" type="number" id="cfgInterval" value="30" min="5" max="120">
    </div>
    <hr class="field-divider">
    <div>
      <div class="field-label">動画URLを追加（他チャンネルMVなど）</div>
      <textarea class="field-textarea" id="cfgPinnedUrls"
                placeholder="https://www.youtube.com/watch?v=...&#10;複数行でまとめてペースト可"></textarea>
      <button class="btn primary" id="addPinnedBtn" onclick="addPinnedVideos()"
              style="margin-top:6px;width:100%">追加して取得</button>
    </div>
    <div id="pinnedListWrap" style="display:none">
      <div class="field-label">追加済み動画</div>
      <div class="pinned-list" id="pinnedList"></div>
    </div>
    <hr class="field-divider">
    <div>
      <div class="field-label">プレイリストを監視（新規動画を自動追加）</div>
      <textarea class="field-textarea" id="cfgPlaylistUrl"
                placeholder="https://www.youtube.com/playlist?list=PL..."></textarea>
      <button class="btn primary" id="addPlaylistBtn" onclick="addPinnedPlaylist()"
              style="margin-top:6px;width:100%">プレイリストを追加</button>
    </div>
    <div id="playlistListWrap" style="display:none">
      <div class="field-label">監視中のプレイリスト</div>
      <div class="pinned-list" id="playlistList"></div>
    </div>
    <hr class="field-divider">
    <div>
      <div class="field-label">データの持ち出し・取り込み</div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button class="btn" onclick="exportData()" style="flex:1">JSON 出力</button>
        <button class="btn" onclick="importData()" style="flex:1">JSON 取り込み</button>
      </div>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none"
           onchange="onImportFile(this)">
    <div class="modal-footer">
      <button class="btn danger" onclick="clearData()">データ削除</button>
      <button class="btn" onclick="closeSettings()">キャンセル</button>
      <button class="btn primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ─── マイルストーン生成 ───────────────────────────────
// 10万刻み(〜90万) → 50万刻み(100万〜500万) → 100万刻み(600万〜900万) → 500万刻み(1000万〜)
const MILESTONES = (() => {
  const m = [];
  for (let i = 1; i <=  9; i++) m.push(i *   100_000); // 10万〜90万
  for (let i = 2; i <= 10; i++) m.push(i *   500_000); // 100万〜500万
  for (let i = 6; i <=  9; i++) m.push(i * 1_000_000); // 600万〜900万
  for (let i = 2; i <= 40; i++) m.push(i * 5_000_000); // 1000万〜2億
  return m;
})();

function getNextMilestone(views) {
  return MILESTONES.find(m => m > views) || null;
}

function getPrevMilestone(views) {
  return [...MILESTONES].reverse().find(m => m <= views) || 0;
}

// ─── ストレージ ───────────────────────────────────────
const IS_PUBLIC_MODE = new URLSearchParams(location.search).get('mode') === 'public';
const STORE_KEY = IS_PUBLIC_MODE ? 'kanade_milestone_tracker_public' : 'kanade_milestone_tracker';

let store = {
  settings: {
    apiKey: '',
    channelHandle: 'OtonoseKanade',
    thresholdDays: 3,
    refreshMinutes: 30,
    showMarkedOnly: true,
    sortBy: 'soon',
    ownChannelId: '',  // チャンネル取得時に保存
    notifEnabled: true
  },
  videos: {},
  lastUpdated: null,
  markedIds: [],            // 手動マーク済み動画ID
  pinnedVideoIds: [],       // 手動追加した動画ID（他チャンネル含む）

async function publicRefetch() {
  try {
    const t = Date.now();
    const [data, cfg] = await Promise.all([
      fetch(`./public_data.json?t=${t}`).then(r => r.json()),
      fetch(`./public_config.json?t=${t}`).then(r => r.json()),

// ─── フォーマット ──────────────────────────────────────
function fmtViewsUnit(n) {
  if (n >= 100_000_000) return { val: (Math.floor(n / 1_000_000) / 100).toFixed(2), unit: '億' };
  if (n >= 10_000)      return { val: (Math.floor(n / 1_000) / 10).toFixed(1),       unit: '万' };
  return { val: n.toLocaleString(), unit: '' };
}

function fmtViews(n) {
  const { val, unit } = fmtViewsUnit(n);
  return val + unit;
}

function fmtMilestone(n) {
  if (n >= 100_000_000) return (n / 100_000_000) + '億';
  if (n >= 10_000)      return (n / 10_000) + '万';
  return n.toLocaleString();
}

function fmtDays(days) {
  if (days <= 0)   return '今日中！';
  if (days < 0.5)  return '今日中！';
  if (days < 1.5)  return '明日';
  return `約${Math.ceil(days)}日後`;
}

// estimatedDays から予想到達日時を「今日 HH:MM」「明日 HH:MM」「M/D HH:MM」形式で返す
function fmtEta(days) {
  if (days <= 0) return 'まもなく';
  const now = new Date();
  const eta = new Date(Date.now() + days * 24 * 3600 * 1000);
  const hhmm = String(eta.getHours()).padStart(2,'0') + ':' + String(eta.getMinutes()).padStart(2,'0');
  // 24時間以内かではなく日付で今日/明日を判定
  const today  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const etaDay = new Date(eta.getFullYear(), eta.getMonth(), eta.getDate());
  const diff   = Math.round((etaDay - today) / 86400000);
  if (diff === 0) return `今日 ${hhmm}`;
  if (diff === 1) return `明日 ${hhmm}`;
  return `${eta.getMonth()+1}/${eta.getDate()} ${hhmm}`;
}

function fmtDatetime(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} `
       + `${String(d.getHours()).padStart(2,'0')}:`
       + `${String(d.getMinutes()).padStart(2,'0')}`;
}

function localTzLabel() {
  const off = -new Date().getTimezoneOffset(); // 分単位、JSTは540
  const h = Math.floor(Math.abs(off) / 60);
  const m = Math.abs(off) % 60;
  const sign = off >= 0 ? '+' : '-';
  return m ? `UTC${sign}${h}:${String(m).padStart(2,'0')}` : `UTC${sign}${h}`;
}

// 秒数 → "H:MM:SS" / "M:SS"
function fmtDuration(secs) {
  if (!secs) return '';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ISO 8601 duration → 秒数 (例: "PT1M30S" → 90)
function parseDuration(iso) {
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return 0;
  return (parseInt(m[1] || 0) * 3600) + (parseInt(m[2] || 0) * 60) + parseInt(m[3] || 0);
}


// ─── YouTube Data API ──────────────────────────────────
async function apiGet(endpoint, params) {
  const url = new URL(`https://www.googleapis.com/youtube/v3/${endpoint}`);
  params.key = store.settings.apiKey;
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url);
  const data = await res.json();
  if (!res.ok) {
    const msg = data.error?.message || res.statusText;
    throw new Error(`YouTube API エラー [${res.status}]: ${msg}`);
  }
  return data;
}

async function fetchPlaylistVideoIds(playlistId) {
  const ids = [];
  let pageToken = null;
  do {
    const params = { part: 'contentDetails', playlistId, maxResults: 50 };
    if (pageToken) params.pageToken = pageToken;
    const pl = await apiGet('playlistItems', params);
    ids.push(...pl.items.map(i => i.contentDetails.videoId));
    pageToken = pl.nextPageToken || null;
  } while (pageToken);
  return ids;
}

async function fetchAllVideos() {
  // チャンネルの uploads プレイリスト ID とチャンネルID を取得
  const chRes = await apiGet('channels', {
    part: 'id,contentDetails',
    forHandle: store.settings.channelHandle
  });
  if (!chRes.items?.length) {
    throw new Error('チャンネルが見つかりません: ' + store.settings.channelHandle);
  }
  const ownChannelId = chRes.items[0].id;
  store.settings.ownChannelId = ownChannelId;
  const uploadsId = chRes.items[0].contentDetails.relatedPlaylists.uploads;

  // 全動画IDを取得（50件ずつページネーション）
  const videoIds = [];
  let pageToken = null;
  let pageCount = 0;
  do {
    const params = { part: 'contentDetails', playlistId: uploadsId, maxResults: 50 };
    if (pageToken) params.pageToken = pageToken;
    const pl = await apiGet('playlistItems', params);
    videoIds.push(...pl.items.map(i => i.contentDetails.videoId));
    pageToken = pl.nextPageToken || null;
    pageCount++;
  } while (pageToken);
  console.log(`[fetch] playlistItems: ${pageCount}ページ, 計${videoIds.length}件のID取得`);

  // 動画の統計・情報を50本ずつバッチ取得
  const now = Date.now();
  const cutoff7d = now - 7 * 24 * 3600 * 1000;
  let storedCount = 0, skippedUpcoming = 0;

  for (let i = 0; i < videoIds.length; i += 50) {
    const batch = videoIds.slice(i, i + 50);
    const vRes = await apiGet('videos', {
      part: 'statistics,snippet,contentDetails',
      id: batch.join(',')
    });
    for (const item of (vRes.items || [])) {
      // 配信中・公開前は除外（再生数が確定していないため）
      const lbc = item.snippet.liveBroadcastContent;
      if (lbc === 'live' || lbc === 'upcoming') { skippedUpcoming++; continue; }
      // 再生数が取れない動画（メンバー限定等）は除外
      if (item.statistics?.viewCount === undefined) continue;

      const dur    = parseDuration(item.contentDetails?.duration || '');
      const views  = parseInt(item.statistics.viewCount || '0');
      const thumb  = item.snippet.thumbnails.medium?.url
                  || item.snippet.thumbnails.default?.url || '';

      if (!store.videos[item.id]) {
        store.videos[item.id] = {
          title: item.snippet.title,
          thumbnail: thumb,
          publishedAt: item.snippet.publishedAt,
          duration: dur,
          channelId: item.snippet.channelId,
          history: []
        };
      }
      store.videos[item.id].title     = item.snippet.title;
      store.videos[item.id].thumbnail = thumb;
      store.videos[item.id].duration  = dur;
      store.videos[item.id].channelId = item.snippet.channelId;

      const hist = store.videos[item.id].history;
      if (!hist.length || hist[hist.length - 1].views !== views) {
        hist.push({ ts: now, views });
      }
      store.videos[item.id].history = hist.filter(h => h.ts >= cutoff7d);
      storedCount++;
    }
  }
  console.log(`[fetch] 保存: ${storedCount}件 / スキップ(配信中/未公開): ${skippedUpcoming}件`);

  // ピン留め動画（チャンネル外）の統計を更新
  const pinnedIds = (store.pinnedVideoIds || []).filter(id => {
    const v = store.videos[id];
    if (!v || !v.channelId) return true; // channelId未設定は再取得
    return v.channelId !== ownChannelId;  // 他チャンネルのみ
  });
  if (pinnedIds.length) {
    for (let i = 0; i < pinnedIds.length; i += 50) {
      const batch = pinnedIds.slice(i, i + 50);
      const pRes = await apiGet('videos', {
        part: 'statistics,snippet,contentDetails',
        id: batch.join(',')
      });
      for (const item of (pRes.items || [])) {
        if (item.statistics?.viewCount === undefined) continue;
        const dur   = parseDuration(item.contentDetails?.duration || '');
        const views = parseInt(item.statistics.viewCount || '0');
        const thumb = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url || '';
        if (!store.videos[item.id]) {
          store.videos[item.id] = {
            title: item.snippet.title,
            thumbnail: thumb,
            publishedAt: item.snippet.publishedAt,
            duration: dur,
            channelId: item.snippet.channelId,
            history: []
          };
        }
        store.videos[item.id].title     = item.snippet.title;
        store.videos[item.id].thumbnail = thumb;
        store.videos[item.id].duration  = dur;
        store.videos[item.id].channelId = item.snippet.channelId;
        const hist = store.videos[item.id].history;
        if (!hist.length || hist[hist.length - 1].views !== views) {
          hist.push({ ts: now, views });
        }
        store.videos[item.id].history = hist.filter(h => h.ts >= cutoff7d);
      }
    }
    console.log(`[fetch] ピン留め動画更新: ${pinnedIds.length}件`);
  }

  // 監視プレイリストから動画IDを収集・統計更新
  const watchedPlaylists = store.pinnedPlaylistIds || [];
  if (watchedPlaylists.length) {
    const plVideoIds = new Set();
    for (const plId of watchedPlaylists) {
      try {
        const ids = await fetchPlaylistVideoIds(plId);
        ids.forEach(id => plVideoIds.add(id));
      } catch(e) {
        console.warn(`[fetch] プレイリスト取得エラー [${plId}]:`, e.message);
      }
    }
    // 自チャンネル動画は既に更新済みなので除外
    const plIds = [...plVideoIds].filter(id => {
      const v = store.videos[id];
      return !v || v.channelId !== ownChannelId;
    });
    if (plIds.length) {
      for (let i = 0; i < plIds.length; i += 50) {
        const batch = plIds.slice(i, i + 50);
        const pRes = await apiGet('videos', {
          part: 'statistics,snippet,contentDetails',
          id: batch.join(',')
        });
        for (const item of (pRes.items || [])) {
          if (item.statistics?.viewCount === undefined) continue;
          const lbc = item.snippet.liveBroadcastContent;
          if (lbc === 'live' || lbc === 'upcoming') continue;
          const dur   = parseDuration(item.contentDetails?.duration || '');
          const views = parseInt(item.statistics.viewCount || '0');
          const thumb = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url || '';
          if (!store.videos[item.id]) {
            store.videos[item.id] = {
              title: item.snippet.title, thumbnail: thumb,
              publishedAt: item.snippet.publishedAt,
              duration: dur, channelId: item.snippet.channelId, history: []
            };
          }
          store.videos[item.id].title     = item.snippet.title;
          store.videos[item.id].thumbnail = thumb;
          store.videos[item.id].duration  = dur;
          store.videos[item.id].channelId = item.snippet.channelId;
          const hist = store.videos[item.id].history;
          if (!hist.length || hist[hist.length - 1].views !== views) hist.push({ ts: now, views });
          store.videos[item.id].history = hist.filter(h => h.ts >= cutoff7d);
        }
      }
      console.log(`[fetch] プレイリスト動画更新: ${plIds.length}件`);
    }
  }

  store.lastUpdated = now;
  saveStore();
}

// ─── 解析 ──────────────────────────────────────────────
function calcGrowthPerDay(history) {
  if (history.length < 2) return null;
  const now = Date.now();
  const cutoff72h = now - 72 * 3600 * 1000;
  // 直近72時間のデータを優先、足りなければ全履歴
  let win = history.filter(h => h.ts >= cutoff72h);
  if (win.length < 2) win = history;
  if (win.length < 2) return null;

  // 最小二乗法で増加速度を推定（全中間点を活用）
  const n = win.length;
  const xs = win.map(h => h.ts / 86400000); // msを日単位に変換
  const ys = win.map(h => h.views);
  const xMean = xs.reduce((a, b) => a + b) / n;
  const yMean = ys.reduce((a, b) => a + b) / n;
  const num = xs.reduce((s, x, i) => s + (x - xMean) * (ys[i] - yMean), 0);
  const den = xs.reduce((s, x)    => s + (x - xMean) ** 2, 0);
  if (den < 1e-9) return null;
  return num / den; // [views/day]
}

function getRecentlyAchieved(history, hours = 48) {
  if (history.length < 2) return null;
  const cutoff48h = Date.now() - hours * 3600 * 1000;
  const recent = history.filter(h => h.ts >= cutoff48h);
  if (recent.length === 0) return null;

  const oldViews = recent[0].views;
  const newViews = history[history.length - 1].views;
  // 指定時間内に超えたマイルストーンのうち最大のものを返す
  const achieved = MILESTONES.filter(m => oldViews < m && newViews >= m);
  return achieved.length > 0 ? achieved[achieved.length - 1] : null;
}

function analyzeVideo(videoId) {
  const video = store.videos[videoId];
  if (!video || !video.history.length) return null;

  const currentViews  = video.history[video.history.length - 1].views;
  const nextMilestone = getNextMilestone(currentViews);
  const growthPerDay  = calcGrowthPerDay(video.history);
  const recentlyAchieved     = getRecentlyAchieved(video.history, 48);
  const recentlyAchieved24h  = getRecentlyAchieved(video.history, 24);
  const ownCh = store.settings.ownChannelId;
  const isExternal = !!(ownCh && video.channelId && video.channelId !== ownCh);

  // 最終取得から現在までの経過分を増加速度で補正してETAを計算
  let estimatedDays = null;
  if (nextMilestone && growthPerDay > 0) {
    const lastTs = video.history[video.history.length - 1].ts;
    const elapsedDays = (Date.now() - lastTs) / 86400000;
    estimatedDays = (nextMilestone - currentViews) / growthPerDay - elapsedDays;
  }

  return {
    id: videoId,
    title:         video.title,
    thumbnail:     video.thumbnail,
    publishedAt:   video.publishedAt,
    duration:      video.duration || 0,
    currentViews,
    nextMilestone,
    growthPerDay,
    estimatedDays,
    recentlyAchieved,
    isApproaching:       estimatedDays !== null && estimatedDays <= store.settings.thresholdDays,
    hasAchievement:      recentlyAchieved !== null,
    achievedWithin1Day: recentlyAchieved24h !== null,
    isExternal
  };
}

function onImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.videos || !parsed.settings) { alert('無効なデータ形式です'); return; }
      store = { ...store, ...parsed, settings: { ...store.settings, ...parsed.settings } };
      markedSet      = new Set(store.markedIds || []);
      showMarkedOnly = store.settings.showMarkedOnly ?? true;
      sortBy         = store.settings.sortBy         ?? 'soon';
      saveStore();
      closeSettings();
      renderMain();
      updatePageTitle();
      alert('インポート完了');
    } catch(err) {
      alert('JSONの解析に失敗しました: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ─── ツイート URL 生成 ──────────────────────────────────
function buildTweetUrl(a) {
  const ytUrl = `https://youtu.be/${a.id}`;
  let text;
  if (a.hasAchievement) {
    text = `${a.title} ${ytUrl} 【${fmtMilestone(a.recentlyAchieved)}再生達成🎉】`;
  } else if (a.isApproaching && a.nextMilestone) {
    text = `${a.title} ${ytUrl} まもなく${fmtMilestone(a.nextMilestone)}再生！（あと${fmtViews(a.nextMilestone - a.currentViews)}）`;
  } else {
    text = `${a.title} ${ytUrl} ${fmtViews(a.currentViews)}再生`;
  }
  return `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
}

// ─── ブラウザ通知 ────────────────────────────────────────
function updatePageTitle() {
  const ch = store.settings.channelHandle || '';
  const title = ch ? `再生回数マイルストーン ー ${ch}` : '再生回数マイルストーン';
  document.title = title;
  document.getElementById('headerTitle').textContent = `🎵 ${title}`;
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn || !('Notification' in window)) { if (btn) btn.style.display = 'none'; return; }
  if (Notification.permission === 'denied') {
    btn.textContent = '🔕'; btn.classList.remove('active'); btn.title = '通知がブロックされています（ブラウザ設定から変更してください）';
  } else if (Notification.permission === 'granted' && store.settings.notifEnabled) {
    btn.textContent = '🔔'; btn.classList.add('active'); btn.title = '通知ON（クリックで解除）';
  } else {
    btn.textContent = '🔔'; btn.classList.remove('active'); btn.title = '通知を有効にする';
  }
}

async function requestNotif() {
  if (!('Notification' in window)) { alert('このブラウザは通知に対応していません'); return; }
  if (Notification.permission === 'denied') { alert('通知がブロックされています。ブラウザのサイト設定から許可してください'); return; }
  if (Notification.permission === 'granted') {
    store.settings.notifEnabled = !store.settings.notifEnabled;
    if (publicMode) {
      if (store.settings.notifEnabled && !publicAutoRefresh) togglePublicAutoRefresh(true);
      if (!store.settings.notifEnabled && publicAutoRefresh) togglePublicAutoRefresh(false);
    }
    saveStore();
    updateNotifBtn();
    return;
  }
  await Notification.requestPermission();
  if (Notification.permission === 'granted') {
    store.settings.notifEnabled = true;
    if (publicMode && !publicAutoRefresh) togglePublicAutoRefresh(true);
  }
  saveStore();
  updateNotifBtn();
}

function checkAndNotify(analyses) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (!store.settings.notifEnabled) return;
  const now = Date.now();
  // 7日より古い通知済み記録を削除
  Object.keys(store.notified).forEach(k => {
    if (now - store.notified[k] > 7 * 24 * 3600 * 1000) delete store.notified[k];
  });
  let updated = false;
  for (const a of analyses) {
    if (!a.recentlyAchieved) continue;
    if (!markedSet.has(a.id)) continue;
    const key = `${a.id}:${a.recentlyAchieved}`;
    if (store.notified[key]) continue;
    store.notified[key] = now;
    updated = true;
    try {
      new Notification('🎉 マイルストーン達成！', {
        body: `${a.title}\n${fmtMilestone(a.recentlyAchieved)}再生 達成`,
        icon: a.thumbnail || undefined
      });
    } catch(e) {}
  }
  if (updated) saveStore();
}

  document.getElementById('sDate').classList.toggle('active',   s === 'date');
  document.getElementById('sSoon').classList.toggle('active',   s === 'soon');
  document.getElementById('sTrend').classList.toggle('active',  s === 'trend');
  renderMain();
}

// ─── レンダリング ───────────────────────────────────────
function buildCard(a) {
  const statusCls = a.hasAchievement      ? 'achieved'
                 : a.achievedWithin1Day ? 'achieved-1d'
                 : a.isApproaching       ? 'approaching' : '';
  const cardCls = [statusCls, a.isExternal ? 'external' : ''].filter(Boolean).join(' ');
  const { val, unit } = fmtViewsUnit(a.currentViews);

  // 進捗バー（前マイルストーン〜次マイルストーン間）
  const prevMs = getPrevMilestone(a.currentViews);
  const progressRatio = a.nextMilestone
    ? (a.currentViews - prevMs) / (a.nextMilestone - prevMs)
    : 1;

  // ETA表示: もうすぐ判定の場合のみ時刻精度、それ以外は日数表示
  let etaHtml;
  if (a.estimatedDays !== null) {
    const cls     = a.isApproaching ? 'soon' : 'normal';
    const etaText = a.isApproaching ? fmtEta(a.estimatedDays) : fmtDays(a.estimatedDays);
    etaHtml = `<span class="milestone-eta ${cls}">${etaText}</span>`;
  } else {
    etaHtml = `<span class="milestone-eta unknown">勢い計算中</span>`;
  }

  // 投稿日・経過日数
  const pub = new Date(a.publishedAt);
  const elapsed = Math.floor((Date.now() - pub.getTime()) / (1000 * 3600 * 24));
  const publishStr = `投稿: ${pub.getFullYear()}/${pub.getMonth()+1}/${pub.getDate()} · ${elapsed}日前`;

  const achievedHtml = a.hasAchievement ? `
    <div class="achieved-badge">
      <span class="achieved-icon">🎉</span>
      <span class="achieved-text">${fmtMilestone(a.recentlyAchieved)}再生 達成！</span>
    </div>` : '';

  const milestoneHtml = a.nextMilestone ? `
    <div class="milestone-row">
      <div class="milestone-label">NEXT MILESTONE</div>
      <div class="milestone-next">
        <span class="milestone-target">${fmtMilestone(a.nextMilestone)}</span>
        <span class="milestone-remaining">あと ${fmtViews(a.nextMilestone - a.currentViews)}</span>
        ${etaHtml}
      </div>
      <div class="progress-wrap">
        <div class="progress-bar ${a.isApproaching ? 'approaching' : 'normal'}"
             style="width:${Math.min(100, progressRatio * 100).toFixed(1)}%"></div>
      </div>
    </div>` : '';

  const growthHtml = a.growthPerDay !== null
    ? `+${fmtViews(Math.round(a.growthPerDay))}/日`
    : 'データ蓄積中...';

  const externalBadgeHtml = a.isExternal
    ? '<div class="external-badge-row"><span class="external-badge">他チャンネル</span></div>'
    : '';

  const isMarked  = markedSet.has(a.id);
  const durStr    = fmtDuration(a.duration);
  const tweetUrl  = buildTweetUrl(a);

  const card = document.createElement('div');
  card.className = `card ${cardCls}${isMarked ? ' marked-card' : ''}`;
  card.addEventListener('click', (e) => {
    if (!e.target.closest('.card-btn'))
      window.open(`https://www.youtube.com/watch?v=${a.id}`, '_blank', 'noopener,noreferrer');
  });
  card.innerHTML = `
    <div class="thumb-wrap">
      <img class="card-thumb" src="${escHtml(a.thumbnail)}" loading="lazy" alt="">
      ${durStr ? `<span class="thumb-duration">${escHtml(durStr)}</span>` : ''}
    </div>
    <button class="mark-btn card-btn${isMarked ? ' marked' : ''}"
            onclick="toggleMark('${a.id}')" title="${isMarked ? 'マーク解除' : 'マーク'}">★</button>
    <div class="card-body">
      <div class="card-title">${escHtml(a.title)}</div>
      ${externalBadgeHtml}
      <div class="views-row">
        <span class="views-count">${val}</span>
        <span class="views-unit">${unit}再生</span>
        <span class="growth-inline">${growthHtml}</span>
      </div>
      ${achievedHtml}
      ${milestoneHtml}
      <div class="card-bottom">
        <div class="publish-row">${escHtml(publishStr)}</div>
        <a class="tweet-btn card-btn" href="${escHtml(tweetUrl)}"
           target="_blank" rel="noopener" onclick="event.stopPropagation()">🐦 ツイート</a>
      </div>
    </div>`;
  return card;
}

function renderMain() {
  const videoIds = Object.keys(store.videos);
  if (!videoIds.length) {
    document.getElementById('mainContent').innerHTML =
      '<div class="status-msg">データがありません。更新ボタンを押してください。</div>';
    return;
  }

  let analyses = videoIds.map(analyzeVideo).filter(Boolean);

  // フィルタ
  if (channelFilter === 'own')      analyses = analyses.filter(a => !a.isExternal);
  else if (channelFilter === 'external') analyses = analyses.filter(a => a.isExternal);
  if (showMarkedOnly) analyses = analyses.filter(a => markedSet.has(a.id));

  // ソート
  if (sortBy === 'date') {
    analyses.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  } else if (sortBy === 'trend') {
    // 勢い: 直近72h の増加速度（views/日）降順。データ未蓄積は末尾
    analyses.sort((a, b) => (b.growthPerDay ?? -Infinity) - (a.growthPerDay ?? -Infinity));
  } else if (sortBy === 'soon') {
    // セクション分け描画側で各グループ内ソートを行うため、ここでは何もしない
  } else {
    // 再生数モード: 純粋な再生数降順
    analyses.sort((a, b) => b.currentViews - a.currentViews);
  }

  // Stats bar・ツールバー表示
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('statApproaching').textContent = analyses.filter(a => a.isApproaching).length;
  document.getElementById('statAchieved').textContent    = analyses.filter(a => a.hasAchievement).length;
  document.getElementById('statTotal').textContent       = analyses.length;
  document.getElementById('statsBar').style.display      = 'flex';

  const grid = document.createElement('div');
  grid.className = 'grid';

  if (sortBy === 'soon') {
    // 注目モード: 達成済み(1日以内) / もうすぐ / その他 のセクション分け
    const sec = [
      { label: '達成済み', items: analyses.filter(a => a.achievedWithin1Day)
          .sort((a, b) => (b.hasAchievement - a.hasAchievement) || b.currentViews - a.currentViews) },
      { label: 'もうすぐ', items: analyses.filter(a => !a.achievedWithin1Day && a.isApproaching)
          .sort((a, b) => (a.estimatedDays ?? Infinity) - (b.estimatedDays ?? Infinity)) },
      { label: 'その他',   items: analyses.filter(a => !a.achievedWithin1Day && !a.isApproaching)
          .sort((a, b) => (a.estimatedDays ?? Infinity) - (b.estimatedDays ?? Infinity)) },
    ];
    sec.forEach(({ label, items }) => {
      if (!items.length) return;
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = label;
      grid.appendChild(hdr);
      items.forEach(a => grid.appendChild(buildCard(a)));
    });
  } else {
    analyses.forEach(a => grid.appendChild(buildCard(a)));
  }

  const content = document.getElementById('mainContent');
  content.innerHTML = '';
  content.appendChild(grid);

  if (store.lastUpdated) {
    document.getElementById('lastUpdated').textContent = fmtDatetime(store.lastUpdated) + ' ' + localTzLabel();
  }
}

// ─── 更新処理 ───────────────────────────────────────────
let refreshTimer = null;

function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(doRefresh, store.settings.refreshMinutes * 60 * 1000);
}

async function doRefresh() {
  if (!store.settings.apiKey) { openSettings(); return; }

  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '取得中...';

  // 既存データがなければローディング表示
  if (!Object.keys(store.videos).length) {
    document.getElementById('mainContent').innerHTML =
      '<div class="status-msg">動画データを取得中...</div>';
  }

  try {
    await fetchAllVideos();
    renderMain();
    // 通知チェック（更新完了後に達成マイルストーンを確認）
    const allAnalyses = Object.keys(store.videos).map(analyzeVideo).filter(Boolean);
    checkAndNotify(allAnalyses);
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="error-msg">✗ ${escHtml(e.message)}</div>`;
    // エラーでも既存データがあれば表示
    if (Object.keys(store.videos).length) renderMain();
  } finally {
    btn.disabled = false;
    btn.textContent = '更新';
    scheduleRefresh();
  }
}

// ─── 設定 ───────────────────────────────────────────────
function openSettings() {
  document.getElementById('cfgApiKey').value    = store.settings.apiKey || '';
  document.getElementById('cfgChannel').value   = store.settings.channelHandle || 'OtonoseKanade';
  document.getElementById('cfgThreshold').value = store.settings.thresholdDays || 3;
  document.getElementById('cfgInterval').value  = store.settings.refreshMinutes || 30;
  document.getElementById('cfgPinnedUrls').value = '';
  document.getElementById('cfgPlaylistUrl').value = '';
  renderPinnedList();
  renderPlaylistList();
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function saveSettings() {
  store.settings.apiKey         = document.getElementById('cfgApiKey').value.trim();
  store.settings.channelHandle  = document.getElementById('cfgChannel').value.trim() || 'OtonoseKanade';
  store.settings.thresholdDays  = parseInt(document.getElementById('cfgThreshold').value) || 3;
  store.settings.refreshMinutes = parseInt(document.getElementById('cfgInterval').value) || 30;
  saveStore();
  updatePageTitle();
  closeSettings();
  if (store.settings.apiKey) doRefresh();
}

function clearData() {
  if (!confirm('履歴データをすべて削除しますか？\n（設定は保持されます）')) return;
  store.videos = {};
  store.lastUpdated = null;
  store.markedIds = [];
  store.notified  = {};
  markedSet = new Set();
  saveStore();
  closeSettings();
  renderMain();
}

// ─── ピン留め動画・プレイリスト管理 ──────────────────────
function parseVideoIds(text) {
  const ids = new Set();
  const re = /(?:youtu\.be\/|[?&]v=)([a-zA-Z0-9_-]{11})/g;
  let m;
  while ((m = re.exec(text)) !== null) ids.add(m[1]);
  return [...ids];
}

async function addPinnedVideos() {
  if (!store.settings.apiKey) { alert('先にAPIキーを保存してください'); return; }
  const text = document.getElementById('cfgPinnedUrls').value.trim();
  if (!text) return;
  const newIds = parseVideoIds(text);
  if (!newIds.length) { alert('有効なYouTube URLが見つかりませんでした'); return; }

  const existing = new Set(store.pinnedVideoIds || []);
  const toFetch = newIds.filter(id => !existing.has(id));
  if (!toFetch.length) { alert('すべて追加済みです'); return; }

  const btn = document.getElementById('addPinnedBtn');
  btn.disabled = true;
  btn.textContent = '取得中...';
  try {
    const now = Date.now();
    const cutoff7d = now - 7 * 24 * 3600 * 1000;
    for (let i = 0; i < toFetch.length; i += 50) {
      const batch = toFetch.slice(i, i + 50);
      const vRes = await apiGet('videos', {
        part: 'statistics,snippet,contentDetails',
        id: batch.join(',')
      });
      for (const item of (vRes.items || [])) {
        if (item.statistics?.viewCount === undefined) continue;
        const lbc = item.snippet.liveBroadcastContent;
        if (lbc === 'live' || lbc === 'upcoming') continue;
        const dur   = parseDuration(item.contentDetails?.duration || '');
        const views = parseInt(item.statistics.viewCount || '0');
        const thumb = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url || '';
        if (!store.videos[item.id]) {
          store.videos[item.id] = {
            title: item.snippet.title,
            thumbnail: thumb,
            publishedAt: item.snippet.publishedAt,
            duration: dur,
            channelId: item.snippet.channelId,
            history: []
          };
        }
        store.videos[item.id].title     = item.snippet.title;
        store.videos[item.id].thumbnail = thumb;
        store.videos[item.id].duration  = dur;
        store.videos[item.id].channelId = item.snippet.channelId;
        const hist = store.videos[item.id].history;
        if (!hist.length || hist[hist.length - 1].views !== views) {
          hist.push({ ts: now, views });
        }
        store.videos[item.id].history = hist.filter(h => h.ts >= cutoff7d);
        existing.add(item.id);
      }
    }
    store.pinnedVideoIds = [...existing];
    saveStore();
    document.getElementById('cfgPinnedUrls').value = '';
    renderPinnedList();
    renderMain();
  } catch(e) {
    alert('取得エラー: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '追加して取得';
  }
}

function removePinnedVideo(id) {
  store.pinnedVideoIds = (store.pinnedVideoIds || []).filter(v => v !== id);
  // 他チャンネル動画のみstoreから削除（チャンネル動画は次回更新で復活するため残す）
  const v = store.videos[id];
  const ownCh = store.settings.ownChannelId;
  if (v && ownCh && v.channelId && v.channelId !== ownCh) {
    delete store.videos[id];
  }
  saveStore();
  renderPinnedList();
  renderMain();
}

function parsePlaylistId(text) {
  const m = text.trim().match(/[?&]list=([A-Za-z0-9_-]+)/);
  return m ? m[1] : null;
}

async function addPinnedPlaylist() {
  if (!store.settings.apiKey) { alert('先にAPIキーを保存してください'); return; }
  const text = document.getElementById('cfgPlaylistUrl').value.trim();
  if (!text) return;
  const plId = parsePlaylistId(text);
  if (!plId) { alert('有効なプレイリストURLが見つかりませんでした'); return; }

  const existing = new Set(store.pinnedPlaylistIds || []);
  if (existing.has(plId)) { alert('すでに追加済みのプレイリストです'); return; }

  const btn = document.getElementById('addPlaylistBtn');
  btn.disabled = true; btn.textContent = '確認中...';
  try {
    const plRes = await apiGet('playlists', { part: 'snippet', id: plId });
    if (!plRes.items?.length) {
      alert('プレイリストが見つかりません（非公開またはURLが不正）'); return;
    }
    const title = plRes.items[0].snippet.title;

    // プレイリスト内の動画IDを取得し、手動ピン済みと重複するものをプレイリスト管理に移行
    // （markedIds のスターはそのまま維持）
    btn.textContent = '動画リスト取得中...';
    const plVideoIds = await fetchPlaylistVideoIds(plId);
    const pinnedSet = new Set(store.pinnedVideoIds || []);
    const moved = plVideoIds.filter(id => pinnedSet.has(id));
    if (moved.length) {
      store.pinnedVideoIds = (store.pinnedVideoIds || []).filter(id => !moved.includes(id));
    }

    existing.add(plId);
    store.pinnedPlaylistIds = [...existing];
    if (!store.pinnedPlaylistMeta) store.pinnedPlaylistMeta = {};
    store.pinnedPlaylistMeta[plId] = { title };
    saveStore();
    document.getElementById('cfgPlaylistUrl').value = '';
    renderPinnedList();
    renderPlaylistList();
    const movedMsg = moved.length ? `\n手動追加済みの${moved.length}件をプレイリスト管理に移行しました（スターは維持）。` : '';
    alert(`「${title}」を追加しました。次回更新時に動画が自動で反映されます。${movedMsg}`);
  } catch(e) {
    alert('取得エラー: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'プレイリストを追加';
  }
}

function removePinnedPlaylist(plId) {
  store.pinnedPlaylistIds = (store.pinnedPlaylistIds || []).filter(id => id !== plId);
  if (store.pinnedPlaylistMeta) delete store.pinnedPlaylistMeta[plId];
  saveStore();
  renderPlaylistList();
}

function renderPlaylistList() {
  const wrap = document.getElementById('playlistListWrap');
  const list = document.getElementById('playlistList');
  if (!wrap || !list) return;
  const ids = store.pinnedPlaylistIds || [];
  if (!ids.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = ids.map(plId => {
    const meta  = store.pinnedPlaylistMeta?.[plId];
    const raw   = meta?.title || plId;
    const title = raw.length > 46 ? raw.substring(0, 46) + '…' : raw;
    return `<div class="pinned-item">
      <span class="pinned-title">${escHtml(title)}</span>
      <button class="btn danger" style="font-size:9px;padding:2px 6px;flex-shrink:0"
              onclick="removePinnedPlaylist('${escHtml(plId)}')">削除</button>
    </div>`;
  }).join('');
}

function renderPinnedList() {
  const wrap = document.getElementById('pinnedListWrap');
  const list = document.getElementById('pinnedList');
  if (!wrap || !list) return;
  const ids = store.pinnedVideoIds || [];
  if (!ids.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = ids.map(id => {
    const v = store.videos[id];
    const raw = v ? v.title : id;
    const title = raw.length > 46 ? raw.substring(0, 46) + '…' : raw;
    return `<div class="pinned-item">
      <span class="pinned-title">${escHtml(title)}</span>
      <button class="btn danger" style="font-size:9px;padding:2px 6px;flex-shrink:0"
              onclick="removePinnedVideo('${escHtml(id)}')">削除</button>
    </div>`;
  }).join('');
}

loadStore();
// ツールバーのボタン状態を復元
document.getElementById('fAll').classList.toggle('active',      channelFilter === 'all');
document.getElementById('fOwn').classList.toggle('active',      channelFilter === 'own');
document.getElementById('fExternal').classList.toggle('active', channelFilter === 'external');
document.getElementById('fMarked').classList.toggle('active',   showMarkedOnly);
document.getElementById('sViews').classList.toggle('active',  sortBy === 'views');
document.getElementById('sDate').classList.toggle('active',   sortBy === 'date');
document.getElementById('sSoon').classList.toggle('active',   sortBy === 'soon');
document.getElementById('sTrend').classList.toggle('active',  sortBy === 'trend');
if (!IS_PUBLIC_MODE) updatePageTitle(); // 公開モードはfetch完了後に呼ぶ
updateNotifBtn();

if (IS_PUBLIC_MODE) {
  publicMode = true;
  // 設定ボタン（⚙）のみ非表示
  document.querySelector('.header-right .btn:last-child').style.display = 'none';
  // 自動更新ボタンに差し替え
  const refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.textContent = '⟳';
  refreshBtn.title = '自動更新 OFF（クリックで開始）';
  refreshBtn.onclick = () => togglePublicAutoRefresh();
  // 公開モードバッジをヘッダーに追加
  const badge = document.createElement('span');
  badge.textContent = '公開';
  badge.style.cssText = 'font-size:9px;padding:2px 6px;border:1px solid #1a5a2a;color:#4caf74;border-radius:3px;white-space:nowrap';
  document.querySelector('.header-right').prepend(badge);

  // リロード前の通知状態を即時復元（データ取得を待たない）
  if (store.settings.notifEnabled && 'Notification' in window && Notification.permission === 'granted') {
    togglePublicAutoRefresh(true);
  }

  Promise.all([
    fetch('./public_data.json').then(r => { if (!r.ok) throw new Error('public_data.json'); return r.json(); }),
    fetch('./public_config.json').then(r => { if (!r.ok) throw new Error('public_config.json'); return r.json(); }),
  ]).then(([data, cfg]) => {
    store.videos                    = data.videos || {};
    store.settings.ownChannelId     = data.ownChannelId || '';
    store.lastUpdated               = data.lastUpdated  || null;
    store.settings.thresholdDays    = cfg.thresholdDays || 3;
    store.settings.channelHandle    = cfg.channelHandle || store.settings.channelHandle;
    markedSet                       = new Set(cfg.markedIds || []);
    store.pinnedVideoIds            = cfg.pinnedVideoIds || [];
    updatePageTitle();
    document.getElementById('toolbar').style.display = 'flex';
    if (store.lastUpdated) {
      document.getElementById('lastUpdated').textContent = fmtDatetime(store.lastUpdated) + ' ' + localTzLabel();
    }
    renderMain();
  }).catch(err => {
    document.getElementById('mainContent').innerHTML =
      `<div style="color:#e06c75;padding:40px;text-align:center">データ読み込みエラー: ${escHtml(err.message)}</div>`;
  });
} else if (!store.settings.apiKey) {
  document.getElementById('mainContent').innerHTML = `
    <div class="setup-screen">
      <div class="setup-box">
        <div class="setup-title">初期設定</div>
        <div class="setup-desc">
          YouTube Data API v3 のキーを入力してください。<br>
          Google Cloud Console で取得できます（無料枠で十分です）。<br>
          キーはこのブラウザの localStorage にのみ保存されます。
        </div>
        <div>
          <div class="field-label">API Key</div>
          <input class="field-input" type="password" id="setupApiKey" placeholder="AIza...">
        </div>
        <button class="btn primary" onclick="applySetup()"
                style="width:100%;padding:10px;font-size:12px">
          保存して開始
        </button>
      </div>
    </div>`;
} else {
  // キャッシュデータがあれば即時表示し、バックグラウンドで更新
  if (Object.keys(store.videos).length) renderMain();
  doRefresh();
}

function applySetup() {
  const key = document.getElementById('setupApiKey')?.value.trim();
  if (!key) return;
  store.settings.apiKey = key;
  saveStore();
  doRefresh();
}

// 1分ごとに再描画してETAを最新に保つ（API呼び出しなし）
setInterval(() => {
  if (Object.keys(store.videos).length) renderMain();
}, 60 * 1000);
